# https://github.com/Arkweid/lefthook/blob/master/docs/full_guide.md

pre-commit:
  commands:
    lint:
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}'
      run: node_modules/.bin/oxlint {staged_files}
    format:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}'
      run: node_modules/.bin/oxfmt --check {staged_files}

commit-msg:
  commands:
    lint-commit-msg:
      run: node_modules/.bin/commitlint --edit
