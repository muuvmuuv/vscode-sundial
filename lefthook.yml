# Refer for explanation to following link:
# https://github.com/Arkweid/lefthook/blob/master/docs/full_guide.md

pre-commit:
  commands:
    lint:
      glob: "*.{js,ts}"
      run: npx eslint --cache-location tmp {staged_files}

commit-msg:
  commands:
    lint-commit-msg:
      run: npx commitlint --edit
